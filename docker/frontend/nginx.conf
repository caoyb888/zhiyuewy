server {
    listen 80;
    server_name localhost;
    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # 支持前端 History 路由模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /static {
        expires 7d;
        add_header Cache-Control "public";
    }

    # 代理后端 API（生产环境前缀 /prod-api）
    location /prod-api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 代理后端 API（开发环境前缀 /dev-api，兼容）
    location /dev-api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 代理住宅收费 B 端 API（zhaoxinwy-pms 模块 /resi/ 路径）
    location /resi/ {
        proxy_pass http://backend:8080/resi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 代理微信小程序 C 端 API（zhaoxinwy-wxmp 模块 /wxmp/ 路径）
    location /wxmp/ {
        proxy_pass http://wxmp:8081/wxmp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
