# 肇新智慧物业 · C端微信小程序服务配置
# 端口 8081，与 B 端 8080 区分
server:
  port: 8081

# Spring 配置
spring:
  application:
    name: zhaoxinwy-wxmp
  profiles:
    active: dev
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhaoxinwy?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: root
  redis:
    host: localhost
    port: 6379
    password:
    database: 1
    timeout: 10s
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.zhaoxinms.**.entity
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: enabledMark
      logic-delete-value: 0
      logic-not-delete-value: 1

# 日志配置
logging:
  level:
    com.zhaoxinms: debug
    org.springframework: warn

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# 微信配置（从环境变量读取，禁止硬编码）
resi:
  wx:
    app-id: ${WX_APPID:}
    app-secret: ${WX_SECRET:}
    mch-id: ${WX_MCH_ID:}
    mch-key: ${WX_MCH_KEY:}
    notify-url: ${WX_NOTIFY_URL:}

# JWT 配置（C端独立Token）
jwt:
  secret: ${JWT_SECRET:resi_wxmp_default_secret_change_in_production}
  expiration: 604800000  # 7天（毫秒）
  refresh-expiration: 2592000000  # 30天（毫秒）
