# ============================================================
# 代码规范检查工作流（独立触发，快速反馈）
# 基于 CLAUDE.md 禁止行为清单和检查项
# ============================================================

name: Code Quality Check

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - 'feature/resi-*'

jobs:
  claude-md-check:
    name: CLAUDE.md Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Code Check Script
        run: |
          chmod +x scripts/code-check.sh
          scripts/code-check.sh origin/${{ github.base_ref || 'develop' }}
        env:
          BASE_REF: ${{ github.base_ref || 'develop' }}

  maven-compile-check:
    name: Maven Compile Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile All Modules
        run: |
          mvn clean compile -B \
            -Dmaven.javadoc.skip=true \
            -Dmaven.test.skip=true
        env:
          MAVEN_OPTS: -Xmx2g -XX:+UseG1GC

  frontend-lint:
    name: Frontend Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: pms-web/package-lock.json

      - name: Install Dependencies
        working-directory: pms-web
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: pms-web
        run: npm run lint || echo "Lint completed with warnings"
